<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrum Velum | Kevyuca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
</head>
<body class="bg-zinc-950 text-white">

    <!-- NAV -->
    <nav class="bg-black/80 backdrop-blur-md fixed w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <img src="../assets/images/logo-kevyuca-trans.png" alt="Kevyuca" class="h-10">
                <span class="text-2xl font-bold">KEVYUCA</span>
            </a>
            <div class="flex gap-8 text-lg">
                <a href="/" class="hover:text-amber-400">Inicio</a>
                <a href="/kevo-i" class="hover:text-amber-400">Kevo-I</a>
                <a href="/ferrumvelum" class="hover:text-amber-400">Ferrum Velum</a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 text-center">
        <div class="max-w-5xl mx-auto px-6">
            <img src="../assets/images/logo-kevyuca-trans.png" alt="Ferrum Velum" class="mx-auto h-32 mb-8">
            <h1 class="text-6xl font-bold mb-6">Ferrum Velum</h1>
            <p class="text-3xl text-amber-400 mb-12">No hay héroes en la historia, solo villanos con capa.</p>

            <!-- Banner del juego -->
            <div class="bg-red-600 rounded-3xl overflow-hidden mb-12">
                <img src="/assets/images/bannerferrumvelum.png" alt="Banner Ferrum Velum" class="w-full">
            </div>

            <div class="max-w-3xl mx-auto text-left text-lg leading-relaxed">
                Ferrum Velum es un juego de espías donde tienes que llevar a cabo la misión Redpunch, para destruir a la Unión Soviética desde adentro.
            </div>

            <a href="https://kevyuca.itch.io/ferrum-velum" target="_blank"
               class="inline-block mt-16 bg-red-600 hover:bg-red-700 text-white font-bold text-2xl px-16 py-7 rounded-2xl transition">
                Próximamente en itch.io →
            </a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-black py-12">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex gap-8 text-4xl">
                <a href="https://instagram.com/kevyuca" target="_blank" class="hover:text-amber-400"><i class="fab fa-instagram"></i></a>
                <a href="https://x.com/KevYuca" target="_blank" class="hover:text-amber-400"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.youtube.com/@KevYuca" target="_blank" class="hover:text-amber-400"><i class="fab fa-youtube"></i></a>
                <a href="https://kevyuca.itch.io" target="_blank" class="hover:text-amber-400"><i class="fab fa-itch-io"></i></a>
            </div>
            <p class="text-zinc-500">FERRUM VELUUUUUUUM</p>
        </div>
    </footer>

</body>
</html>
